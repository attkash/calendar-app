<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Georgia', serif; background: #fff; }

    body.pdf-layout-landscape-spread { min-width: 297mm; }
    body.pdf-layout-portrait-single { min-width: 210mm; }

    /* ——— Landscape spread: two pages per month (297×210 mm each) ——— */
    body.pdf-layout-landscape-spread .page {
      width: 297mm;
      min-height: 210mm;
      max-height: 210mm;
      page-break-after: always;
      break-after: page;
      overflow: hidden;
    }
    body.pdf-layout-landscape-spread .page:last-child {
      page-break-after: auto;
      break-after: auto;
    }

    body.pdf-layout-landscape-spread .page--month-photo {
      display: flex;
      flex-direction: column;
      padding: 10mm;
    }
    body.pdf-layout-landscape-spread .month-photo-area {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 2px;
    }
    body.pdf-layout-landscape-spread .photo.photo--spread {
      display: block;
      flex: 1;
      width: 100%;
      min-height: 0;
      max-height: none;
      margin: 0;
      object-fit: cover;
      border-radius: 2px;
    }
    body.pdf-layout-landscape-spread .photo-placeholder.photo--spread {
      flex: 1;
      width: 100%;
      min-height: 40mm;
      margin: 0;
      border-radius: 2px;
      background: #e8eaed;
      border: 1px dashed #c5c9d0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 16px;
    }
    body.pdf-layout-landscape-spread .month-spread-title {
      flex-shrink: 0;
      font-size: 2cm;
      font-weight: 400;
      color: #2c3e50;
      text-align: center;
      margin-top: 5mm;
      line-height: 1.05;
      letter-spacing: 0.04em;
    }

    body.pdf-layout-landscape-spread .page--month-calendar {
      display: flex;
      flex-direction: column;
      padding: 8mm;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .grid {
      flex: 1;
      min-height: 0;
      width: 100%;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: minmax(22mm, 1fr);
      gap: 2px;
      align-content: stretch;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .cell {
      min-height: 22mm;
      border: 1px solid #e0e0e0;
      padding: 3px;
      display: flex;
      flex-direction: column;
      font-size: 10px;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .cell-header {
      min-height: 11mm;
      font-weight: 600;
      color: #2c3e50;
      text-align: center;
      background: #f8f9fa;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .date {
      font-weight: 600;
      color: #34495e;
      margin-bottom: 2px;
      min-height: 1.2em;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .event {
      flex: 1;
      display: block;
      font-size: 9px;
      color: #555;
      line-height: 1.35;
      word-break: break-word;
      white-space: normal;
    }

    body.pdf-layout-landscape-spread .page--month-calendar.page--date-size-5 .grid {
      gap: 1px;
      grid-auto-rows: minmax(18mm, 1fr);
    }
    body.pdf-layout-landscape-spread .page--month-calendar.page--date-size-5 .cell:not(.cell-header) {
      padding: 1px 2px;
      min-height: 18mm;
      overflow: hidden;
    }
    body.pdf-layout-landscape-spread .page--month-calendar.page--date-size-5 .cell-header {
      min-height: 9mm;
      padding: 2px;
    }
    body.pdf-layout-landscape-spread .page--month-calendar.page--date-size-5 .date {
      line-height: 0.95;
      margin-bottom: 1px;
    }
    body.pdf-layout-landscape-spread .page--month-calendar.page--date-size-5 .event {
      font-size: 7px;
      line-height: 1.2;
    }

    /* ——— Portrait single: photo + grid on one A4 portrait page (210×297 mm) ——— */
    body.pdf-layout-portrait-single .page {
      width: 210mm;
      min-height: 297mm;
      max-height: 297mm;
      page-break-after: always;
      break-after: page;
      overflow: hidden;
    }
    body.pdf-layout-portrait-single .page:last-child {
      page-break-after: auto;
      break-after: auto;
    }

    body.pdf-layout-portrait-single .page--month-combined {
      display: flex;
      flex-direction: column;
      padding: 12mm;
    }
    body.pdf-layout-portrait-single .month-combined-title {
      font-size: 1.35cm;
      font-weight: 400;
      color: #2c3e50;
      text-align: center;
      margin-bottom: 6mm;
      line-height: 1.1;
      letter-spacing: 0.04em;
    }
    body.pdf-layout-portrait-single .month-combined-photo {
      flex-shrink: 0;
      margin-bottom: 6mm;
    }
    body.pdf-layout-portrait-single .photo.photo--inline {
      display: block;
      width: 100%;
      max-height: 88mm;
      min-height: 55mm;
      object-fit: cover;
      border-radius: 2px;
    }
    body.pdf-layout-portrait-single .photo-placeholder.photo--inline {
      width: 100%;
      max-height: 88mm;
      min-height: 55mm;
      border-radius: 2px;
      background: #e8eaed;
      border: 1px dashed #c5c9d0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 14px;
    }
    body.pdf-layout-portrait-single .page--month-combined .grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: minmax(16mm, 1fr);
      gap: 2px;
    }
    body.pdf-layout-portrait-single .page--month-combined .cell {
      min-height: 16mm;
      border: 1px solid #e0e0e0;
      padding: 3px;
      display: flex;
      flex-direction: column;
      font-size: 10px;
    }
    body.pdf-layout-portrait-single .page--month-combined .cell-header {
      min-height: 10mm;
      font-weight: 600;
      color: #2c3e50;
      text-align: center;
      background: #f8f9fa;
    }
    body.pdf-layout-portrait-single .page--month-combined .date {
      font-weight: 600;
      color: #34495e;
      margin-bottom: 2px;
      min-height: 1.2em;
    }
    body.pdf-layout-portrait-single .page--month-combined .event {
      flex: 1;
      display: block;
      font-size: 9px;
      color: #555;
      line-height: 1.35;
      word-break: break-word;
      white-space: normal;
    }

    body.pdf-layout-portrait-single .page--month-combined.page--date-size-5-combined .photo.photo--inline,
    body.pdf-layout-portrait-single .page--month-combined.page--date-size-5-combined .photo-placeholder.photo--inline {
      max-height: 62mm;
      min-height: 36mm;
    }
    body.pdf-layout-portrait-single .page--month-combined.page--date-size-5-combined .grid {
      gap: 1px;
      grid-auto-rows: minmax(18mm, 1fr);
    }
    body.pdf-layout-portrait-single .page--month-combined.page--date-size-5-combined .cell:not(.cell-header) {
      padding: 1px 2px;
      min-height: 18mm;
      overflow: hidden;
    }
    body.pdf-layout-portrait-single .page--month-combined.page--date-size-5-combined .date {
      line-height: 0.95;
      margin-bottom: 1px;
    }
    body.pdf-layout-portrait-single .page--month-combined.page--date-size-5-combined .event {
      font-size: 7px;
      line-height: 1.2;
    }

    @page { margin: 0; }

    @media print {
      body.pdf-layout-landscape-spread .page,
      body.pdf-layout-portrait-single .page {
        page-break-after: always;
      }
      body.pdf-layout-landscape-spread .page:last-child,
      body.pdf-layout-portrait-single .page:last-child {
        page-break-after: auto;
      }
    }
  </style>
</head>
<body class="{{bodyClass}}">
  {{content}}
</body>
</html>
