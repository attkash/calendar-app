<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Georgia', serif; background: #fff; }

    body.pdf-layout-landscape-spread { min-width: 297mm; }
    body.pdf-layout-portrait-single { min-width: 210mm; }

    /* ——— Landscape spread: two pages per month (297×210 mm each) ——— */
    body.pdf-layout-landscape-spread .page {
      width: 297mm;
      min-height: 210mm;
      max-height: 210mm;
      page-break-after: always;
      break-after: page;
      overflow: hidden;
    }
    body.pdf-layout-landscape-spread .page:last-child {
      page-break-after: auto;
      break-after: auto;
    }

    body.pdf-layout-landscape-spread .page--month-photo {
      display: flex;
      flex-direction: column;
      padding: 10mm;
    }
    body.pdf-layout-landscape-spread .month-photo-area {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 2px;
    }
    body.pdf-layout-landscape-spread .photo.photo--spread {
      display: block;
      flex: 1;
      width: 100%;
      min-height: 0;
      max-height: none;
      margin: 0;
      object-fit: cover;
      border-radius: 2px;
    }
    body.pdf-layout-landscape-spread .photo-placeholder.photo--spread {
      flex: 1;
      width: 100%;
      min-height: 40mm;
      margin: 0;
      border-radius: 2px;
      background: #e8eaed;
      border: 1px dashed #c5c9d0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 16px;
    }
    body.pdf-layout-landscape-spread .month-spread-title {
      flex-shrink: 0;
      font-size: 2cm;
      font-weight: 400;
      color: #2c3e50;
      text-align: center;
      margin-top: 5mm;
      line-height: 1.05;
      letter-spacing: 0.04em;
    }

    body.pdf-layout-landscape-spread .page--month-calendar {
      display: flex;
      flex-direction: column;
      padding: 8mm;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .cal-month-grid-root {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .cal-month-grid {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .cal-row--dow {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      flex: 0 0 auto;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .cal-row:not(.cal-row--dow) {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      flex: 1;
      min-height: 0;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .cell {
      min-height: 0;
      border: 1px solid #e0e0e0;
      padding: 3px;
      display: flex;
      flex-direction: column;
      font-size: 10px;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .cell-day-top {
      flex-shrink: 0;
      display: flex;
      width: 100%;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .cell.date-pos-top-left .cell-day-top {
      justify-content: flex-start;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .cell.date-pos-top-left .date {
      text-align: left;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .cell.date-pos-top-center .cell-day-top {
      justify-content: center;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .cell.date-pos-top-center .date {
      text-align: center;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .cell.date-pos-center .cell-day-top {
      flex: 1;
      min-height: 0;
      align-items: center;
      justify-content: center;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .cell.date-pos-center .date {
      text-align: center;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .cell.date-pos-center .event {
      flex-shrink: 1;
      min-height: 0;
      max-height: 55%;
      overflow: hidden;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .cell-header {
      min-height: 0;
      max-height: 5.5mm;
      padding: 0.5mm 1px;
      line-height: 1;
      font-weight: 600;
      font-size: 3.1mm;
      letter-spacing: 0.02em;
      color: #2c3e50;
      text-align: center;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .date {
      font-weight: 600;
      color: #34495e;
      margin-bottom: 2px;
      min-height: 1.2em;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .event {
      display: block;
      margin-top: auto;
      width: 100%;
      flex: 0 1 auto;
      font-size: 9px;
      line-height: 1.35;
      word-break: break-word;
      white-space: normal;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .event-line--user {
      color: #555;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .event-line--holiday {
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.15em;
      max-width: 100%;
      color: #b42318;
      font-weight: 600;
    }
    body.pdf-layout-landscape-spread .page--month-calendar .event-line--holiday .holiday-label {
      min-width: 0;
    }

    body.pdf-layout-landscape-spread .page--month-calendar.page--date-size-5 .cal-month-grid {
      gap: 1px;
    }
    body.pdf-layout-landscape-spread .page--month-calendar.page--date-size-5 .cell:not(.cell-header) {
      padding: 1px 2px;
      min-height: 0;
      overflow: hidden;
    }
    body.pdf-layout-landscape-spread .page--month-calendar.page--date-size-5 .cell-header {
      max-height: 4.8mm;
      padding: 0.3mm 1px;
      font-size: 2.9mm;
    }
    body.pdf-layout-landscape-spread .page--month-calendar.page--date-size-5 .date {
      line-height: 0.95;
      margin-bottom: 1px;
    }
    body.pdf-layout-landscape-spread .page--month-calendar.page--date-size-5 .event {
      font-size: 7px;
      line-height: 1.2;
    }

    /* ——— Portrait single: photo + grid on one A4 portrait page (210×297 mm) ——— */
    body.pdf-layout-portrait-single .page {
      width: 210mm;
      min-height: 297mm;
      max-height: 297mm;
      page-break-after: always;
      break-after: page;
      overflow: hidden;
    }
    body.pdf-layout-portrait-single .page:last-child {
      page-break-after: auto;
      break-after: auto;
    }

    body.pdf-layout-portrait-single .page--month-combined {
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      height: 297mm;
      min-height: 297mm;
      max-height: 297mm;
      padding: 8mm 12mm 8mm 12mm;
    }
    body.pdf-layout-portrait-single .month-combined-title {
      font-size: 1.35cm;
      font-weight: 400;
      color: #2c3e50;
      text-align: center;
      margin: 0 0 3mm;
      line-height: 1.1;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    /* Upper half of A4 (297mm): photo block uses full 148.5mm band */
    body.pdf-layout-portrait-single .month-combined-photo {
      flex: 0 0 148.5mm;
      width: 100%;
      min-height: 0;
      margin: 0 0 3mm;
      overflow: hidden;
      border-radius: 2px;
      display: flex;
      flex-direction: column;
    }
    body.pdf-layout-portrait-single .photo.photo--inline {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 0;
      max-height: none;
      object-fit: cover;
      border-radius: 2px;
    }
    body.pdf-layout-portrait-single .photo-placeholder.photo--inline {
      width: 100%;
      height: 100%;
      min-height: 0;
      max-height: none;
      border-radius: 2px;
      background: #e8eaed;
      border: 1px dashed #c5c9d0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 14px;
    }
    body.pdf-layout-portrait-single .page--month-combined .cal-month-grid-root {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    body.pdf-layout-portrait-single .page--month-combined .cal-month-grid {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    body.pdf-layout-portrait-single .page--month-combined .cal-row--dow {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      flex: 0 0 auto;
    }
    body.pdf-layout-portrait-single .page--month-combined .cal-row:not(.cal-row--dow) {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      flex: 1;
      min-height: 0;
    }
    body.pdf-layout-portrait-single .page--month-combined .cell {
      min-height: 0;
      border: 1px solid #e0e0e0;
      padding: 3px;
      display: flex;
      flex-direction: column;
      font-size: 10px;
    }
    body.pdf-layout-portrait-single .page--month-combined .cell-day-top {
      flex-shrink: 0;
      display: flex;
      width: 100%;
    }
    body.pdf-layout-portrait-single .page--month-combined .cell.date-pos-top-left .cell-day-top {
      justify-content: flex-start;
    }
    body.pdf-layout-portrait-single .page--month-combined .cell.date-pos-top-left .date {
      text-align: left;
    }
    body.pdf-layout-portrait-single .page--month-combined .cell.date-pos-top-center .cell-day-top {
      justify-content: center;
    }
    body.pdf-layout-portrait-single .page--month-combined .cell.date-pos-top-center .date {
      text-align: center;
    }
    body.pdf-layout-portrait-single .page--month-combined .cell.date-pos-center .cell-day-top {
      flex: 1;
      min-height: 0;
      align-items: center;
      justify-content: center;
    }
    body.pdf-layout-portrait-single .page--month-combined .cell.date-pos-center .date {
      text-align: center;
    }
    body.pdf-layout-portrait-single .page--month-combined .cell.date-pos-center .event {
      flex-shrink: 1;
      min-height: 0;
      max-height: 55%;
      overflow: hidden;
    }
    body.pdf-layout-portrait-single .page--month-combined .cell-header {
      min-height: 0;
      max-height: 5.5mm;
      padding: 0.5mm 1px;
      line-height: 1;
      font-weight: 600;
      font-size: 3.1mm;
      letter-spacing: 0.02em;
      color: #2c3e50;
      text-align: center;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body.pdf-layout-portrait-single .page--month-combined .date {
      font-weight: 600;
      color: #34495e;
      margin-bottom: 2px;
      min-height: 1.2em;
    }
    body.pdf-layout-portrait-single .page--month-combined .event {
      display: block;
      margin-top: auto;
      width: 100%;
      flex: 0 1 auto;
      font-size: 9px;
      line-height: 1.35;
      word-break: break-word;
      white-space: normal;
    }
    body.pdf-layout-portrait-single .page--month-combined .event-line--user {
      color: #555;
    }
    body.pdf-layout-portrait-single .page--month-combined .event-line--holiday {
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.15em;
      max-width: 100%;
      color: #b42318;
      font-weight: 600;
    }
    body.pdf-layout-portrait-single .page--month-combined .event-line--holiday .holiday-label {
      min-width: 0;
    }

    body.pdf-layout-portrait-single .page--month-combined.page--date-size-5-combined .cal-month-grid {
      gap: 1px;
    }
    body.pdf-layout-portrait-single .page--month-combined.page--date-size-5-combined .cell:not(.cell-header) {
      padding: 1px 2px;
      min-height: 0;
      overflow: hidden;
    }
    body.pdf-layout-portrait-single .page--month-combined.page--date-size-5-combined .cell-header {
      max-height: 4.8mm;
      padding: 0.3mm 1px;
      font-size: 2.9mm;
    }
    body.pdf-layout-portrait-single .page--month-combined.page--date-size-5-combined .date {
      line-height: 0.95;
      margin-bottom: 1px;
    }
    body.pdf-layout-portrait-single .page--month-combined.page--date-size-5-combined .event {
      font-size: 7px;
      line-height: 1.2;
    }

    /* Weekend columns: Sat & Sun (column order follows week start in HTML) */
    body.pdf-layout-landscape-spread .cell-header--weekend,
    body.pdf-layout-portrait-single .cell-header--weekend {
      color: #b42318 !important;
      background: #fef2f2;
    }
    body.pdf-layout-landscape-spread .cell--weekend:not(.cell-header),
    body.pdf-layout-portrait-single .cell--weekend:not(.cell-header) {
      background: #fffafa;
    }
    body.pdf-layout-landscape-spread .cell--weekend:not(.cell-header) .date,
    body.pdf-layout-portrait-single .cell--weekend:not(.cell-header) .date {
      color: #b42318;
    }
    body.pdf-layout-landscape-spread .cell--weekend:not(.cell-header) .event .event-line--user,
    body.pdf-layout-portrait-single .cell--weekend:not(.cell-header) .event .event-line--user {
      color: #6b2c2c;
    }

    @page { margin: 0; }

    @media print {
      body.pdf-layout-landscape-spread .page,
      body.pdf-layout-portrait-single .page {
        page-break-after: always;
      }
      body.pdf-layout-landscape-spread .page:last-child,
      body.pdf-layout-portrait-single .page:last-child {
        page-break-after: auto;
      }
    }
  </style>
</head>
<body class="{{bodyClass}}">
  {{content}}
</body>
</html>
